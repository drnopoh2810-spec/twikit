<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>تسجيل الدخول - Twitter API</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #1da1f2 0%, #0d8bd9 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .login-container {
      background: white;
      border-radius: 16px;
      padding: 40px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.2);
    }

    .logo {
      text-align: center;
      font-size: 48px;
      margin-bottom: 20px;
    }

    h1 {
      text-align: center;
      color: #14171a;
      margin-bottom: 10px;
      font-size: 24px;
    }

    .subtitle {
      text-align: center;
      color: #657786;
      margin-bottom: 30px;
      font-size: 14px;
    }

    .tabs {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }

    .tab {
      flex: 1;
      padding: 10px;
      background: #f5f8fa;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      transition: all 0.2s;
    }

    .tab.active {
      background: #1da1f2;
      color: white;
    }

    .form {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    .form.hidden {
      display: none;
    }

    input {
      padding: 14px;
      border: 1px solid #e1e8ed;
      border-radius: 8px;
      font-size: 14px;
      font-family: inherit;
    }

    input:focus {
      outline: none;
      border-color: #1da1f2;
    }

    button[type="submit"] {
      padding: 14px;
      background: #1da1f2;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    button[type="submit"]:hover {
      background: #1a91da;
    }

    .error {
      color: #e0245e;
      font-size: 13px;
      text-align: center;
      display: none;
    }

    .error.show {
      display: block;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="logo">🐦</div>
    <h1>Twitter API Dashboard</h1>
    <p class="subtitle">قم بتسجيل الدخول أو إنشاء حساب جديد</p>

    <div class="tabs">
      <button class="tab active" onclick="switchForm('login')">تسجيل الدخول</button>
      <button class="tab" onclick="switchForm('register')">حساب جديد</button>
    </div>

    <form id="login-form" class="form">
      <input type="text" id="login-username" placeholder="اسم المستخدم" required />
      <input type="password" id="login-password" placeholder="كلمة المرور" required />
      <button type="submit">تسجيل الدخول</button>
      <div class="error" id="login-error"></div>
    </form>

    <form id="register-form" class="form hidden">
      <input type="text" id="register-username" placeholder="اسم المستخدم" required />
      <input type="password" id="register-password" placeholder="كلمة المرور" required />
      <input type="password" id="register-confirm" placeholder="تأكيد كلمة المرور" required />
      <button type="submit">إنشاء حساب</button>
      <div class="error" id="register-error"></div>
    </form>
  </div>

  <script>
    function switchForm(type) {
      document.querySelectorAll('.tab').forEach(tab => tab.classList.remove('active'));
      event.target.classList.add('active');

      if (type === 'login') {
        document.getElementById('login-form').classList.remove('hidden');
        document.getElementById('register-form').classList.add('hidden');
      } else {
        document.getElementById('register-form').classList.remove('hidden');
        document.getElementById('login-form').classList.add('hidden');
      }
    }

    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const username = document.getElementById('login-username').value;
      const password = document.getElementById('login-password').value;
      const errorEl = document.getElementById('login-error');

      try {
        const response = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password }),
        });

        const data = await response.json();

        if (data.success) {
          localStorage.setItem('token', data.token);
          window.location.href = '/dashboard.html';
        } else {
          errorEl.textContent = data.error || 'فشل تسجيل الدخول';
          errorEl.classList.add('show');
        }
      } catch (error) {
        errorEl.textContent = 'حدث خطأ في الاتصال';
        errorEl.classList.add('show');
      }
    });

    document.getElementById('register-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const username = document.getElementById('register-username').value;
      const password = document.getElementById('register-password').value;
      const confirm = document.getElementById('register-confirm').value;
      const errorEl = document.getElementById('register-error');

      if (password !== confirm) {
        errorEl.textContent = 'كلمات المرور غير متطابقة';
        errorEl.classList.add('show');
        return;
      }

      try {
        const response = await fetch('/api/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password }),
        });

        const data = await response.json();

        if (data.success) {
          localStorage.setItem('token', data.token);
          window.location.href = '/dashboard.html';
        } else {
          errorEl.textContent = data.error || 'فشل إنشاء الحساب';
          errorEl.classList.add('show');
        }
      } catch (error) {
        errorEl.textContent = 'حدث خطأ في الاتصال';
        errorEl.classList.add('show');
      }
    });
  </script>
</body>
</html>
